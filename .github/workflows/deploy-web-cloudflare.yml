# ============================================================
# Deploy web (apps/web) → Cloudflare Pages
# ------------------------------------------------------------
# vite build 产出 apps/web/dist，再用 wrangler(cloudflare/wrangler-action)
# 部署到 Cloudflare Pages 项目 yy-workflow-aigc。
#
# 需要在仓库里配置(Settings → Secrets and variables → Actions):
#
#   Repository secrets(注意：放仓库级，不要放进某个 Environment):
#     CLOUDFLARE_API_TOKEN    —— Cloudflare API Token(权限含 Pages 编辑)
#     CLOUDFLARE_ACCOUNT_ID   —— Cloudflare 账号 ID
#
#   Repository variables(可选):
#     VITE_SERVER_URL         —— 后端 API 基址，打进前端包(tRPC/better-auth 用)。
#                                不配则用下方默认(已部署的 Lambda API)。
#
# API Token 生成:Cloudflare Dashboard → My Profile → API Tokens →
#   Create Token → 用 "Edit Cloudflare Workers" 模板(含 Pages)，或自定义
#   Account.Cloudflare Pages = Edit。
# ============================================================

name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-web-cloudflare.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch: {}

concurrency:
  group: deploy-web-cf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: github.event_name != 'pull_request' || (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    name: Build & deploy to Pages
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        # 前端构建不需要真实 DB/后端密钥；占位值 + 跳过服务端 env 校验，让 postinstall 的 prisma generate 跑完。
        env:
          SKIP_ENV_VALIDATION: "1"
          DATABASE_URL: "postgresql://user:pass@localhost:5432/placeholder"
        run: pnpm install --frozen-lockfile

      - name: Build web
        # VITE_SERVER_URL 缺失时构建会失败(env 校验)；用仓库变量，未配则回退到已部署的 Lambda API。
        env:
          VITE_SERVER_URL: ${{ vars.VITE_SERVER_URL || 'https://kn0oq7adrl.execute-api.ap-northeast-1.amazonaws.com' }}
          VITE_PROFILE_GO_URL: ${{ vars.VITE_PROFILE_GO_URL }}
          VITE_PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: pnpm exec turbo run build --filter=web

      - name: Verify build output
        run: |
          if [ ! -f apps/web/dist/index.html ]; then
            echo "::error::apps/web/dist/index.html 不存在，构建可能失败" && exit 1
          fi

      - name: Deploy to Cloudflare Pages
        # 直接用 pnpm dlx 运行 wrangler(即时下载，像 npx)，用环境变量认证。
        # 不用 cloudflare/wrangler-action：它在 pnpm monorepo 里会尝试用 pnpm 跑未安装的
        # wrangler 而失败(pnpm exec wrangler 找不到 → exit 1)。
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_BRANCH: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || 'master' }}
        run: |
          set -euo pipefail
          # 幂等创建 Pages 项目：已存在则忽略失败。
          pnpm dlx wrangler@latest pages project create yy-workflow-aigc \
            --production-branch=master || true
          # 部署构建产物到 Pages。
          pnpm dlx wrangler@latest pages deploy apps/web/dist \
            --project-name=yy-workflow-aigc --branch="$DEPLOY_BRANCH"

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    name: Delete Pages preview
    runs-on: ubuntu-latest
    steps:
      - name: Delete deployments for PR branch
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          RESPONSE="$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/yy-workflow-aigc/deployments")"
          echo "$RESPONSE" \
            | jq -r --arg branch "$PREVIEW_BRANCH" \
              '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id' \
            | while read -r deployment_id; do
                test -n "$deployment_id" || continue
                curl -fsS -X DELETE \
                  -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                  "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/yy-workflow-aigc/deployments/${deployment_id}"
              done
